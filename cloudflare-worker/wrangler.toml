name = "plaid-notion-sync"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Nightly reconciliation sweep at 1:00 AM EST (06:00 UTC).
# Catches anything Plaid's webhook might have missed and flips late-posting
# pending transactions to Posted status.
[triggers]
crons = ["0 6 * * *"]

# KV namespace for storing Plaid cursors per institution.
# Create this with:  wrangler kv:namespace create "SYNC_STATE"
# Then paste the returned `id` here.
[[kv_namespaces]]
binding = "SYNC_STATE"
id = "5c511c070bf345d9b195520b18a5ea19"

# Non-secret configuration. Secrets (Plaid secret, Notion token, access tokens)
# are set separately via `wrangler secret put`.
[vars]
# Data source under the "Transactions" database (the database has two data
# sources; this is the one with our schema). Notion API >= 2025-09-03 requires
# the data source id, not the database id, for queries and page creation.
NOTION_DATA_SOURCE_ID = "28e06a50-4ec0-46c7-8896-6c1e60c7995f"
PLAID_ENV = "production"  # one of: sandbox | development | production
